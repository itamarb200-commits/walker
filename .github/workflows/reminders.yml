name: Walker reminders

# Pings the app every 15 minutes. The server loops every family, checks each
# task's due times against that family's own timezone, and dedupes per
# family+task+day via reminders_sent — so per-family schedules live in the
# tasks table, not in this cron.
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}   # allow manual "Run workflow" from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger reminder check
        run: |
          curl -fsS -X POST "$APP_URL/api/push/send" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            -d '{}'
        env:
          # Set repo variable APP_URL once Vercel deploy is live (Phase 6).
          APP_URL: ${{ vars.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
